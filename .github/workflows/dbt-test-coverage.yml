name: dbt Test Coverage

on:
  pull_request:
    paths:
      - analytics/dbt/models/**
      - analytics/dbt/tests/**
      - analytics/dbt/dbt_project.yml
      - .github/workflows/dbt-test-coverage.yml

jobs:
  check-test-coverage:
    name: Every dbt model must have at least one test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core dbt-duckdb

      - name: Install dbt packages
        working-directory: analytics/dbt
        run: dbt deps

      - name: Parse dbt project
        working-directory: analytics/dbt
        run: dbt parse

      - name: Enforce test coverage on every model
        working-directory: analytics/dbt
        run: |
          python3 <<'PY'
          import json, sys, pathlib

          manifest_path = pathlib.Path("target/manifest.json")
          if not manifest_path.exists():
              print("::error::target/manifest.json missing - dbt parse likely failed")
              sys.exit(1)

          m = json.loads(manifest_path.read_text())
          nodes = m["nodes"]

          # Legacy models grandfathered out of the gate. New/renamed models are
          # NOT here, so they must carry at least one test. Burn this down over time.
          allowlist_path = pathlib.Path(".dbt-test-coverage-allowlist.txt")
          allowlist = set()
          if allowlist_path.exists():
              for raw in allowlist_path.read_text().splitlines():
                  line = raw.strip()
                  if line and not line.startswith("#"):
                      allowlist.add(line)

          tests_per_model = {
              uid: set()
              for uid, n in nodes.items()
              if n["resource_type"] == "model"
          }
          for uid, n in nodes.items():
              if n["resource_type"] != "test":
                  continue
              for dep in n.get("depends_on", {}).get("nodes", []):
                  if dep in tests_per_model:
                      tests_per_model[dep].add(uid)

          missing = []
          for uid, tests in tests_per_model.items():
              if tests:
                  continue
              node = nodes[uid]
              if node["name"] in allowlist:
                  continue
              missing.append(f"  - {node['name']} ({node['path']})")

          # Flag allowlisted models that now HAVE tests so the list stays honest.
          stale = sorted(
              nodes[uid]["name"]
              for uid, tests in tests_per_model.items()
              if tests and nodes[uid]["name"] in allowlist
          )

          if missing:
              print("::error::The following dbt models have NO tests. Add at least one test in schema.yml (unique/not_null/dbt_utils.unique_combination_of_columns/relationships):")
              for line in missing:
                  print(line)
              sys.exit(1)

          if stale:
              print("::warning::These models are in .dbt-test-coverage-allowlist.txt but now have tests. Remove them from the allowlist:")
              for name in stale:
                  print(f"  - {name}")

          allowed = len(allowlist)
          enforced = len(tests_per_model) - allowed
          print(f"OK - {enforced} enforced models all have a test; {allowed} legacy models grandfathered.")
          PY
