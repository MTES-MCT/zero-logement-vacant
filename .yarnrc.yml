      "@turf/flatten": "*"
  knex@*:
    dependencies:
      pg-query-stream: "*"
  postcss-loader@*:
    dependencies:
      browserslist: "*"
      postcss-flexbugs-fixes: "*"
      postcss-normalize: "*"
      postcss-preset-env: "*"
  sass-loader@*:
    dependencies:
      sass: "*"
