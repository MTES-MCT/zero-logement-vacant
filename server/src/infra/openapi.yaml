        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Utilisateur trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Non authentifié
        '404':
          description: Utilisateur non trouvé
    put:
      summary: Modifier un utilisateur
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdatePayload'
      responses:
        '200':
          description: Utilisateur mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Non authentifié
    delete:
      summary: Supprimer un utilisateur
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Utilisateur supprimé
        '401':
          description: Non authentifié
        '403':
          description: Droits insuffisants (admin requis)

  # ── Geo perimeters ───────────────────────────────────────────────────────────
  /geo/perimeters:
    get:
      summary: Lister les périmètres géographiques
      tags: [Geo]
      responses:
        '200':
          description: Liste des périmètres
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GeoPerimeter'
        '401':
          description: Non authentifié
    post:
      summary: Créer un périmètre géographique (upload shapefile)
      tags: [Geo]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Archive ZIP contenant un shapefile
      responses:
        '201':
          description: Périmètre créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeoPerimeter'
        '401':
          description: Non authentifié
    delete:
      summary: Supprimer des périmètres géographiques
      tags: [Geo]
      responses:
        '204':
          description: Périmètres supprimés
        '401':
          description: Non authentifié

  /geo/perimeters/{geoPerimeterId}:
    put:
      summary: Modifier un périmètre géographique
      tags: [Geo]
      parameters:
        - in: path
          name: geoPerimeterId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Périmètre mis à jour
        '401':
          description: Non authentifié

  # ── Dashboards ───────────────────────────────────────────────────────────────
  /dashboards/{id}:
    get:
      summary: Récupérer un tableau de bord
      tags: [Statistics]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Tableau de bord
        '401':
          description: Non authentifié
        '404':
          description: Tableau de bord non trouvé

  # ── Datafoncier ──────────────────────────────────────────────────────────────
  /datafoncier/housing/{localId}:
    get:
      summary: Récupérer un logement Datafoncier
      tags: [Housing]
      parameters:
        - in: path
          name: localId
          required: true
          schema:
            type: string
            minLength: 12
            maxLength: 12
          description: Identifiant local fiscal (12 caractères)
      responses:
        '200':
          description: Logement Datafoncier
        '401':
          description: Non authentifié
        '404':
          description: Logement non trouvé
